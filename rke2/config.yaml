# RKE2 集群配置文件

# 集群基本信息
cluster_name: rke2-cluster
default_user: root

# SSH 配置
ssh:
  private_key_path: ~/.ssh/id_rsa
  public_key_path: ~/.ssh/id_rsa.pub
  password: your-ssh-password  # 如果使用密码认证
  port: 22
  connection_timeout: 30
  connection_retries: 3

# API Server 负载均衡配置
api_server:
  nginx_server:
    ip_address: 178.128.93.192  # 使用第一个主节点作为负载均衡器
    hostname: lb.example.com
    username: root
  port: 6443      # API Server 端口
  nginx_port: 8443 # Nginx 监听端口

# 节点配置
master_nodes:
  - ip_address: 178.128.93.192
    hostname: master1.example.com
    username: root
    name: master1
  # - ip_address: 192.168.1.12
  #   hostname: master2.example.com
  #   username: root
  #   name: master2
  # - ip_address: 192.168.1.13
  #   hostname: master3.example.com
  #   username: root
  #   name: master3

worker_nodes:
  - ip_address: 178.128.93.192
    hostname: worker1.example.com
    username: root
    name: worker1
  # - ip_address: 192.168.1.15
  #   hostname: worker2.example.com
  #   username: root
  #   name: worker2
  # - ip_address: 192.168.1.16
  #   hostname: worker3.example.com
  #   username: root
  #   name: worker3

# 版本信息
versions:
  # Core Components
  rke2:
    version: v1.29.2+rke2r1
    url_template: https://github.com/rancher/rke2/releases/download/{version}/rke2

  kubernetes:
    version: v1.29.2
    min_version: v1.28.0
    max_version: v1.29.x

  containerd:
    version: v1.7.13
    url_template: https://github.com/containerd/containerd/releases/download/v{version}/containerd-{version}-linux-amd64.tar.gz

  # Network Components
  calico:
    version: v3.27.2
    operator_version: v1.32.6
    url_template: https://github.com/projectcalico/calico/releases/download/v{version}/release-v{version}.tgz

  # Management UI
  rancher:
    version: v2.8.2
    min_version: v2.7.0
    helm_chart_version: 2.8.2
    repository: rancher-latest
    url: https://releases.rancher.com/server-charts/latest

  # Supporting Tools
  helm:
    version: v3.14.2
    url_template: https://get.helm.sh/helm-{version}-linux-amd64.tar.gz

  cert_manager:
    version: v1.14.3
    url_template: https://github.com/cert-manager/cert-manager/releases/download/{version}/cert-manager.yaml

  kubectl:
    version: v1.29.2
    url_template: https://dl.k8s.io/release/{version}/bin/linux/amd64/kubectl

  kubectx:
    version: v0.9.5
    url_template: https://github.com/ahmetb/kubectx/releases/download/{version}/kubectx

  # Monitoring Stack
  prometheus:
    version: v2.50.1
    operator_version: v0.72.0

  grafana:
    version: 10.4.0

  # Storage
  longhorn:
    version: v1.6.0
    helm_chart_version: 1.6.0

# 版本兼容性矩阵
compatibility_matrix:
  rke2_v1.29.x:
    kubernetes: v1.29.x
    containerd: v1.7.x
    calico: v3.27.x
    rancher: v2.8.x
    cert_manager: v1.14.x
  rke2_v1.28.x:
    kubernetes: v1.28.x
    containerd: v1.7.x
    calico: v3.26.x
    rancher: v2.8.x
    cert_manager: v1.13.x

# Rancher 配置
rancher:
  hostname: rancher.example.com
  password: admin123
  replicas: 3

# 网络配置
network:
  pod_cidr: 10.42.0.0/16
  service_cidr: 10.43.0.0/16
  cni: calico
  mtu: 1440

# 镜像加速配置
registry_mirrors:
  docker.io:
    - https://mirror.ccs.tencentyun.com
    - https://registry.docker-cn.com
    - https://docker.mirrors.ustc.edu.cn
  gcr.io:
    - https://registry.aliyuncs.com
    - https://registry.cn-hangzhou.aliyuncs.com

# 系统优化配置
system:
  sysctl:
    net.ipv4.ip_forward: 1
    net.bridge.bridge-nf-call-iptables: 1
    net.bridge.bridge-nf-call-ip6tables: 1
    vm.swappiness: 10
    vm.dirty_ratio: 60
    vm.dirty_background_ratio: 30
    vm.max_map_count: 262144
  limits:
    nofile: 1048576
    nproc: 65535
    memlock: unlimited

# Kubernetes 组件配置
kubernetes:
  kubelet:
    max_pods: 150
    kube_reserved:
      cpu: 200m
      memory: 512Mi
    system_reserved:
      cpu: 200m
      memory: 512Mi
    eviction_hard:
      memory.available: 5%
      nodefs.available: 10%
    image_gc:
      high_threshold: 85
      low_threshold: 80

  api_server:
    max_requests_inflight: 1000
    max_mutating_requests_inflight: 500
    default_watch_cache_size: 1000

  controller_manager:
    node_monitor_period: 2s
    node_monitor_grace_period: 16s
    pod_eviction_timeout: 30s

  scheduler:
    name: default-scheduler

  etcd:
    quota_backend_bytes: 8589934592
    auto_compaction_retention: 8
    snapshot_count: 10000

# 资源配额配置
resource_quotas:
  default:
    requests:
      cpu: 4
      memory: 8Gi
    limits:
      cpu: 8
      memory: 16Gi

# 默认资源限制
limit_ranges:
  default:
    container:
      default:
        cpu: 500m
        memory: 512Mi
      default_request:
        cpu: 200m
        memory: 256Mi

# RKE2 特定配置
token: "your-secure-token"
tls-san:
  - your-lb-domain.com
disable:
  - rke2-ingress-nginx  # We'll use Rancher's nginx-ingress
write-kubeconfig-mode: "0644"
node-label:
  - "region=local"
system-default-registry: "docker.io"